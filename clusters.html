<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Clusters — Gestor Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #181c27;
        --surface2: #1e2333;
        --border: #2a3045;
        --accent: #4ade80;
        --accent2: #f87171;
        --accent3: #60a5fa;
        --text: #e8eaf0;
        --muted: #7a8299;
        --radius: 12px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        min-height: 100vh;
        display: flex;
      }
      .sidebar {
        width: 220px;
        min-height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 28px 0;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 10;
      }
      .sidebar-logo {
        font-family: "DM Serif Display", serif;
        font-size: 1.3rem;
        color: var(--accent);
        padding: 0 24px 28px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo span {
        color: var(--muted);
        font-size: 0.75rem;
        display: block;
        font-family: "DM Sans", sans-serif;
        margin-top: 2px;
      }
      .nav {
        padding: 20px 0;
        flex: 1;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 24px;
        color: var(--muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        border-left: 3px solid transparent;
        transition: all 0.15s;
      }
      .nav a:hover,
      .nav a.active {
        color: var(--text);
        background: var(--surface2);
        border-left-color: var(--accent);
      }
      .nav a .icon {
        font-size: 1.1rem;
        width: 20px;
        text-align: center;
      }
      .main {
        margin-left: 220px;
        flex: 1;
        padding: 36px 40px;
        max-width: calc(100vw - 220px);
      }
      select,
      input {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        outline: none;
      }
      select:focus,
      input:focus {
        border-color: var(--accent3);
      }
      select option {
        background: var(--surface2);
      }
      input[type="number"] {
        width: 80px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 18px;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--accent);
        color: #0a1a0f;
      }
      .btn-primary:hover {
        background: #22c55e;
      }
      .btn-ghost {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .ctrl-row {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }
      .ctrl-row h1 {
        font-family: "DM Serif Display", serif;
        font-size: 2rem;
        font-weight: 400;
        letter-spacing: -0.5px;
        flex: 1;
      }
      .ctrl-row h1 span {
        color: var(--accent3);
      }
      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ctrl-group label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
      }
      .info-bar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .info-pill {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 0.82rem;
      }
      .info-pill strong {
        color: var(--text);
      }
      .info-pill span {
        color: var(--muted);
      }
      .clusters-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .cluster-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .cluster-header {
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }
      .cluster-emoji {
        font-size: 1.4rem;
      }
      .cluster-nome {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .cluster-qtd {
        margin-left: auto;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .cluster-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-bottom: 1px solid var(--border);
      }
      .cstat {
        padding: 12px 16px;
        border-right: 1px solid var(--border);
      }
      .cstat:last-child {
        border-right: none;
      }
      .cstat-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .cstat-val {
        font-family: "DM Serif Display", serif;
        font-size: 1.15rem;
      }
      .cluster-body {
        max-height: 220px;
        overflow-y: auto;
      }
      .cluster-tx-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }
      .cluster-tx-row:last-child {
        border-bottom: none;
      }
      .cluster-tx-desc {
        font-weight: 500;
      }
      .cluster-tx-meta {
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 1px;
      }
      .cluster-tx-val {
        font-family: "DM Serif Display", serif;
        font-size: 0.95rem;
        white-space: nowrap;
        margin-left: 12px;
      }
      .cluster-body::-webkit-scrollbar {
        width: 4px;
      }
      .cluster-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .charts-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 24px;
      }
      .chart-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 24px;
      }
      .card-title {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .erro-box {
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.25);
        border-radius: var(--radius);
        padding: 32px;
        text-align: center;
        color: var(--accent2);
      }
      .erro-box .icon {
        font-size: 2rem;
        display: block;
        margin-bottom: 10px;
      }
      .loading {
        text-align: center;
        padding: 60px;
        color: var(--muted);
      }
      .loading .spin {
        font-size: 2rem;
        display: block;
        margin-bottom: 12px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        Gestor Financeiro<span>Gestão Inteligente</span>
      </div>
      <nav class="nav">
        <nav class="nav">
        <a href="/"><span class="icon">📊</span>Dashboard</a>
        <a href="/transacoes"> <span class="icon">💳</span>Transações</a>
        <a href="/relatorio"> <span class="icon">📄</span>Relatório</a>
        <a href="/clusters" class="active"> <span class="icon">🔬</span>Clusters</a>
      </nav>
    </aside>

    <main class="main">
      <div class="ctrl-row">
        <h1>Clusters <span>K-Means</span></h1>
        <div class="ctrl-group">
          <label>Analisar</label>
          <select id="ctrlTipo">
            <option value="gasto">💸 Gastos</option>
            <option value="ganho">💰 Ganhos</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>Nº clusters (k)</label>
          <input type="number" id="ctrlK" min="2" max="8" value="3" />
        </div>
        <button class="btn btn-primary" onclick="rodar()">
          ▶ Rodar K-Means
        </button>
      </div>

      <div id="resultado"></div>
    </main>

    <script src="/static/api.js"></script>
    <script>
      async function rodar() {
        const tipo = document.getElementById("ctrlTipo").value;
        const k = parseInt(document.getElementById("ctrlK").value);
        const el = document.getElementById("resultado");

        el.innerHTML = `<div class="loading"><span class="spin">⚙️</span>Rodando K-Means...</div>`;

        try {
          const d = await API.clusters({ tipo, k });
          renderResultado(d);
        } catch (e) {
          el.innerHTML = `
      <div class="erro-box">
        <span class="icon">⚠️</span>
        ${e.message}
        <div style="margin-top:16px"><a href="/transacoes" class="btn btn-ghost">＋ Cadastrar transações</a></div>
      </div>`;
        }
      }

      function renderResultado(d) {
        const el = document.getElementById("resultado");

        // ── Info bar ──
        let html = `
    <div class="info-bar">
      <div class="info-pill"><span>Tipo: </span><strong>${d.tipo}</strong></div>
      <div class="info-pill"><span>k = </span><strong>${d.k} clusters</strong></div>
      <div class="info-pill"><span>Inércia (WCSS): </span><strong>${d.inercia}</strong></div>
      <div class="info-pill"><span>Iterações: </span><strong>${d.n_iter}</strong></div>
      <div class="info-pill"><span>Features: </span><strong>valor (R$), mês</strong></div>
    </div>
    <div class="clusters-grid">`;

        // ── Cards ──
        for (let cid = 0; cid < d.k; cid++) {
          const txs = d.grupos[String(cid)] || [];
          const perfil = d.perfis[String(cid)] || {
            nome: "Cluster " + (cid + 1),
            cor: "#60a5fa",
            emoji: "🔵",
          };
          const soma = txs.reduce((s, t) => s + t.valor, 0);
          const media = txs.length ? soma / txs.length : 0;
          const sorted = [...txs].sort((a, b) => b.valor - a.valor);

          html += `
      <div class="cluster-card" style="border-top:3px solid ${perfil.cor}">
        <div class="cluster-header">
          <span class="cluster-emoji">${perfil.emoji}</span>
          <div><div class="cluster-nome" style="color:${perfil.cor}">${perfil.nome}</div></div>
          <span class="cluster-qtd">${txs.length} transação(ões)</span>
        </div>
        <div class="cluster-stats">
          <div class="cstat">
            <div class="cstat-label">Valor médio</div>
            <div class="cstat-val" style="color:${perfil.cor}">${fmtBRL(media)}</div>
          </div>
          <div class="cstat">
            <div class="cstat-label">Total</div>
            <div class="cstat-val">${fmtBRL(soma)}</div>
          </div>
        </div>
        <div class="cluster-body">
          ${
            sorted.length
              ? sorted
                  .map(
                    (t) => `
            <div class="cluster-tx-row">
              <div>
                <div class="cluster-tx-desc">${t.descricao}</div>
                <div class="cluster-tx-meta">${String(t.mes).padStart(2, "0")}/${t.ano}</div>
              </div>
              <div class="cluster-tx-val" style="color:${perfil.cor}">${fmtBRL(t.valor)}</div>
            </div>`,
                  )
                  .join("")
              : `<div style="padding:16px;color:var(--muted);font-size:.85rem;text-align:center">Cluster vazio</div>`
          }
        </div>
      </div>`;
        }

        html += `</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="card-title">Dispersão — Valor × Mês</div>
        <div style="position:relative;height:260px;margin-top:8px">
          <canvas id="scatterChart" height="260"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="card-title">Método do Cotovelo</div>
        <div style="position:relative;height:260px;margin-top:8px">
          <canvas id="cotoChart" height="260"></canvas>
        </div>
      </div>
    </div>`;

        el.innerHTML = html;

        requestAnimationFrame(() => {
          desenharScatter("scatterChart", d.grupos, d.perfis);
          desenharCotovelo("cotoChart", d.cotovelo, d.k);
        });
      }

      window.addEventListener("DOMContentLoaded", rodar);
      window.addEventListener("resize", () => {
        const el = document.getElementById("scatterChart");
        if (el) {
          const tipo = document.getElementById("ctrlTipo").value;
          const k = parseInt(document.getElementById("ctrlK").value);
          API.clusters({ tipo, k })
            .then(renderResultado)
            .catch(() => {});
        }
      });
    </script>
  </body>
</html>
