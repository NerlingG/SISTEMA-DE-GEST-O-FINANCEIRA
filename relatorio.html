<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Relatório — Gestor Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #181c27;
        --surface2: #1e2333;
        --border: #2a3045;
        --accent: #4ade80;
        --accent2: #f87171;
        --accent3: #60a5fa;
        --text: #e8eaf0;
        --muted: #7a8299;
        --radius: 12px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        min-height: 100vh;
        display: flex;
      }
      .sidebar {
        width: 220px;
        min-height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 28px 0;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 10;
      }
      .sidebar-logo {
        font-family: "DM Serif Display", serif;
        font-size: 1.3rem;
        color: var(--accent);
        padding: 0 24px 28px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo span {
        color: var(--muted);
        font-size: 0.75rem;
        display: block;
        font-family: "DM Sans", sans-serif;
        margin-top: 2px;
      }
      .nav {
        padding: 20px 0;
        flex: 1;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 24px;
        color: var(--muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        border-left: 3px solid transparent;
        transition: all 0.15s;
      }
      .nav a:hover,
      .nav a.active {
        color: var(--text);
        background: var(--surface2);
        border-left-color: var(--accent);
      }
      .nav a .icon {
        font-size: 1.1rem;
        width: 20px;
        text-align: center;
      }
      .main {
        margin-left: 220px;
        flex: 1;
        padding: 36px 40px;
        max-width: calc(100vw - 220px);
      }
      select,
      input {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        outline: none;
      }
      select:focus,
      input:focus {
        border-color: var(--accent3);
      }
      select option {
        background: var(--surface2);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 18px;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all 0.15s;
      }
      .btn-ghost {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .rel-header {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        margin-bottom: 28px;
        flex-wrap: wrap;
      }
      .rel-header h1 {
        font-family: "DM Serif Display", serif;
        font-size: 2rem;
        font-weight: 400;
        letter-spacing: -0.5px;
        flex: 1;
      }
      .rel-header h1 span {
        color: var(--accent);
      }
      .rel-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      .rel-stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 22px;
      }
      .rel-stat-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .rel-stat-val {
        font-family: "DM Serif Display", serif;
        font-size: 1.75rem;
      }
      .rel-stat-val.g {
        color: var(--accent);
      }
      .rel-stat-val.r {
        color: var(--accent2);
      }
      .rel-stat-sub {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 4px;
      }
      .chart-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 24px;
        margin-bottom: 20px;
      }
      .card-title {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-ganho {
        background: rgba(74, 222, 128, 0.15);
        color: var(--accent);
      }
      .badge-gasto {
        background: rgba(248, 113, 113, 0.15);
        color: var(--accent2);
      }
      .rel-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      .rel-table thead th {
        padding: 9px 14px;
        text-align: left;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }
      .rel-table tbody td {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
      }
      .rel-table tbody tr:last-child td {
        border-bottom: none;
      }
      .rel-table tbody tr:hover td {
        background: var(--surface2);
      }
      @media print {
        .sidebar, .rel-header select, .btn { display: none !important; }
        .main { margin-left: 0 !important; padding: 16px !important; }
        .chart-card { page-break-inside: avoid; }
        .chart-card canvas { max-width: 100% !important; display: block; }
        .card { page-break-inside: avoid; }
        body { background: #fff !important; color: #000 !important; }
        .rel-stat-val.g { color: #15803d !important; }
        .rel-stat-val.r { color: #b91c1c !important; }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        Gestor Financeiro<span>Gestão Inteligente</span>
      </div>
      <nav class="nav">
        <a href="/"> <span class="icon">📊</span>Dashboard</a>
        <a href="/transacoes"> <span class="icon">💳</span>Transações</a>
        <a href="/relatorio" class="active"
          ><span class="icon">📄</span>Relatório</a
        >
        <a href="/clusters"> <span class="icon">🔬</span>Clusters</a>
      </nav>
    </aside>

    <main class="main">
      <div class="rel-header">
        <h1>Relatório <span id="labelPeriodo"></span></h1>
        <select id="selMes"></select>
        <select id="selAno"></select>
        <button class="btn btn-ghost" onclick="window.print()">
          🖨️ Imprimir
        </button>
      </div>

      <div class="rel-stats">
        <div class="rel-stat">
          <div class="rel-stat-label">💰 Total de Ganhos</div>
          <div class="rel-stat-val g" id="statGanhos">—</div>
          <div class="rel-stat-sub" id="statGanhosQt"></div>
        </div>
        <div class="rel-stat">
          <div class="rel-stat-label">💸 Total de Gastos</div>
          <div class="rel-stat-val r" id="statGastos">—</div>
          <div class="rel-stat-sub" id="statGastosQt"></div>
        </div>
        <div class="rel-stat">
          <div class="rel-stat-label">📊 Saldo Final</div>
          <div class="rel-stat-val" id="statSaldo">—</div>
          <div class="rel-stat-sub" id="statTaxa"></div>
        </div>
      </div>

      <div class="chart-card">
        <div class="card-title">Evolução dos últimos 7 meses</div>
        <div style="position: relative; height: 240px; margin-top: 12px">
          <canvas id="lineChart" height="240"></canvas>
        </div>
        <div
          style="
            display: flex;
            gap: 20px;
            margin-top: 14px;
            font-size: 0.8rem;
            color: var(--muted);
          "
        >
          <span
            ><span
              style="
                display: inline-block;
                width: 14px;
                height: 3px;
                background: var(--accent);
                vertical-align: middle;
                border-radius: 2px;
                margin-right: 5px;
              "
            ></span
            >Ganhos</span
          >
          <span
            ><span
              style="
                display: inline-block;
                width: 14px;
                height: 3px;
                background: var(--accent2);
                vertical-align: middle;
                border-radius: 2px;
                margin-right: 5px;
              "
            ></span
            >Gastos</span
          >
          <span
            ><span
              style="
                display: inline-block;
                width: 14px;
                height: 3px;
                background: var(--accent3);
                vertical-align: middle;
                border-radius: 2px;
                margin-right: 5px;
              "
            ></span
            >Saldo</span
          >
        </div>
      </div>

      <div class="card" style="padding: 0">
        <div style="padding: 20px 24px 14px">
          <div class="card-title">Todas as transações do mês</div>
        </div>
        <div id="tabelaWrap" style="overflow-x: auto"></div>
      </div>
    </main>

    <script src="/static/api.js"></script>
    <script>
      const hoje = new Date();
      let mesSel = hoje.getMonth() + 1;
      let anoSel = hoje.getFullYear();

      async function init() {
        await mesOptions(document.getElementById("selMes"), mesSel);
        await anoOptions(document.getElementById("selAno"), anoSel);
        await render();
      }

      async function render() {
        try {
          const d = await API.relatorio({ mes: mesSel, ano: anoSel });

          document.getElementById("labelPeriodo").textContent =
            MESES_NOME[mesSel] + " / " + anoSel;
          document.getElementById("statGanhos").textContent = fmtBRL(
            d.total_ganhos,
          );
          document.getElementById("statGastos").textContent = fmtBRL(
            d.total_gastos,
          );

          const ganhos = d.transacoes.filter((t) => t.tipo === "ganho");
          const gastos = d.transacoes.filter((t) => t.tipo === "gasto");
          document.getElementById("statGanhosQt").textContent =
            ganhos.length + " lançamento(s)";
          document.getElementById("statGastosQt").textContent =
            gastos.length + " lançamento(s)";

          const sEl = document.getElementById("statSaldo");
          sEl.textContent = fmtBRL(d.saldo);
          sEl.className = "rel-stat-val " + (d.saldo >= 0 ? "g" : "r");

          if (d.total_ganhos > 0) {
            const taxa = ((d.total_gastos / d.total_ganhos) * 100).toFixed(1);
            document.getElementById("statTaxa").textContent =
              taxa + "% da renda comprometida";
          }

          desenharLinha("lineChart", d.evolucao);

          if (d.transacoes.length) {
            const sorted = [...d.transacoes].sort(
              (a, b) => a.tipo.localeCompare(b.tipo) || b.valor - a.valor,
            );
            document.getElementById("tabelaWrap").innerHTML = `
        <table class="rel-table">
          <thead><tr><th>Tipo</th><th>Descrição</th><th style="text-align:right">Valor</th></tr></thead>
          <tbody>${sorted
            .map(
              (t) => `
            <tr>
              <td><span class="badge badge-${t.tipo}">${t.tipo}</span></td>
              <td style="font-weight:500">${t.descricao}</td>
              <td style="text-align:right;font-family:'DM Serif Display',serif;color:${t.tipo === "ganho" ? "var(--accent)" : "var(--accent2)"}">
                ${t.tipo === "ganho" ? "+" : "-"}${fmtBRL(t.valor)}</td>
            </tr>`,
            )
            .join("")}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--border)">
              <td colspan="2" style="padding:13px 14px;font-weight:600;color:var(--muted)">SALDO FINAL</td>
              <td style="text-align:right;padding:13px 14px;font-family:'DM Serif Display',serif;font-size:1.1rem;color:${d.saldo >= 0 ? "var(--accent)" : "var(--accent2)"}">
                ${fmtBRL(d.saldo)}</td>
            </tr>
          </tfoot>
        </table>`;
          } else {
            document.getElementById("tabelaWrap").innerHTML =
              `<div style="text-align:center;padding:40px;color:var(--muted)">Nenhuma transação neste mês.</div>`;
          }
        } catch (e) {
          console.error(e);
        }
      }

      document
        .getElementById("selMes")
        .addEventListener("change", async (e) => {
          mesSel = parseInt(e.target.value);
          await render();
        });
      document
        .getElementById("selAno")
        .addEventListener("change", async (e) => {
          anoSel = parseInt(e.target.value);
          await anoOptions(document.getElementById("selAno"), anoSel);
          await render();
        });
      window.addEventListener("resize", () =>
        API.relatorio({ mes: mesSel, ano: anoSel })
          .then((d) => desenharLinha("lineChart", d.evolucao))
          .catch(() => {}),
      );

      init();
    </script>
  </body>
</html>
