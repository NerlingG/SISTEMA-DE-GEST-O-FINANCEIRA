<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dashboard — Gestão de Finanças</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #181c27;
        --surface2: #1e2333;
        --border: #2a3045;
        --accent: #4ade80;
        --accent2: #f87171;
        --accent3: #60a5fa;
        --text: #e8eaf0;
        --muted: #7a8299;
        --radius: 12px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        min-height: 100vh;
        display: flex;
      }
      .sidebar {
        width: 220px;
        min-height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 28px 0;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 10;
      }
      .sidebar-logo {
        font-family: "DM Serif Display", serif;
        font-size: 1.3rem;
        color: var(--accent);
        padding: 0 24px 28px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo span {
        color: var(--muted);
        font-size: 0.75rem;
        display: block;
        font-family: "DM Sans", sans-serif;
        margin-top: 2px;
      }
      .nav {
        padding: 20px 0;
        flex: 1;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 24px;
        color: var(--muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        border-left: 3px solid transparent;
        transition: all 0.15s;
      }
      .nav a:hover,
      .nav a.active {
        color: var(--text);
        background: var(--surface2);
        border-left-color: var(--accent);
      }
      .nav a .icon {
        font-size: 1.1rem;
        width: 20px;
        text-align: center;
      }
      .main {
        margin-left: 220px;
        flex: 1;
        padding: 36px 40px;
        max-width: calc(100vw - 220px);
      }
      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 32px;
      }
      .page-header h1 {
        font-family: "DM Serif Display", serif;
        font-size: 2rem;
        font-weight: 400;
        letter-spacing: -0.5px;
      }
      .page-header h1 span {
        color: var(--accent);
      }
      .period-bar {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      select,
      input {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.15s;
      }
      select:focus,
      input:focus {
        border-color: var(--accent3);
      }
      select option {
        background: var(--surface2);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 18px;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--accent);
        color: #0a1a0f;
      }
      .btn-primary:hover {
        background: #22c55e;
      }
      .btn-ghost {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-sm {
        padding: 5px 12px;
        font-size: 0.8rem;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px 24px;
      }
      .stat-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .stat-value {
        font-family: "DM Serif Display", serif;
        font-size: 1.9rem;
        font-weight: 400;
      }
      .stat-value.ganho {
        color: var(--accent);
      }
      .stat-value.gasto {
        color: var(--accent2);
      }
      .stat-value.pos {
        color: var(--accent);
      }
      .stat-value.neg {
        color: var(--accent2);
      }
      .saldo-bar-wrap {
        height: 6px;
        background: var(--surface2);
        border-radius: 4px;
        margin-top: 14px;
        overflow: hidden;
      }
      .saldo-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.6s ease;
      }
      .saldo-hint {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 6px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
      }
      .card-title {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .dash-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
      }
      .dash-grid .full {
        grid-column: 1/-1;
      }
      .tx-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 0;
        border-bottom: 1px solid var(--border);
      }
      .tx-row:last-child {
        border-bottom: none;
      }
      .tx-desc {
        font-size: 0.9rem;
        font-weight: 500;
      }
      .tx-meta {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .tx-val {
        font-family: "DM Serif Display", serif;
        font-size: 1.05rem;
      }
      .tx-val.ganho {
        color: var(--accent);
      }
      .tx-val.gasto {
        color: var(--accent2);
      }
      .donut-wrap {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .donut-legend {
        flex: 1;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 0.85rem;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .legend-name {
        color: var(--muted);
        flex: 1;
      }
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .empty .icon {
        font-size: 2.2rem;
        display: block;
        margin-bottom: 10px;
      }
      .skeleton {
        background: var(--surface2);
        border-radius: 6px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        Gestor Financeiro<span>Gestão Inteligente</span>
      </div>
      <nav class="nav">
        <a href="/" class="active"><span class="icon">📊</span>Dashboard</a>
        <a href="/transacoes"> <span class="icon">💳</span>Transações</a>
        <a href="/relatorio"> <span class="icon">📄</span>Relatório</a>
        <a href="/clusters"> <span class="icon">🔬</span>Clusters</a>
      </nav>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1>Dashboard <span>financeiro</span></h1>
        <div class="period-bar">
          <select id="selMes"></select>
          <select id="selAno"></select>
          <a href="/transacoes" class="btn btn-primary">＋ Nova transação</a>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">💰 Total de Ganhos</div>
          <div class="stat-value ganho" id="totalGanhos">—</div>
          <div class="saldo-bar-wrap">
            <div
              class="saldo-bar-fill"
              style="width: 100%; background: var(--accent)"
            ></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">💸 Total de Gastos</div>
          <div class="stat-value gasto" id="totalGastos">—</div>
          <div class="saldo-bar-wrap">
            <div
              class="saldo-bar-fill"
              id="barGastos"
              style="width: 0%; background: var(--accent2)"
            ></div>
          </div>
          <div class="saldo-hint" id="pctRenda"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">📈 Saldo do Mês</div>
          <div class="stat-value" id="saldoMes">—</div>
          <div class="saldo-hint" id="labelMesAno"></div>
        </div>
      </div>

      <div class="dash-grid">
        <div class="card full">
          <div class="card-title">Evolução — últimos 7 meses</div>
          <div style="position: relative; width: 100%; height: 220px">
            <canvas id="evolChart" height="220"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Distribuição Ganhos × Gastos</div>
          <div
            id="donutWrap"
            class="donut-wrap"
            style="margin-top: 12px; display: none"
          >
            <canvas
              id="donutChart"
              width="130"
              height="130"
              style="flex-shrink: 0"
            ></canvas>
            <div class="donut-legend" id="donutLegend"></div>
          </div>
          <div id="donutEmpty" class="empty">
            <span class="icon">🍩</span>Nenhum dado ainda.
          </div>
        </div>
        <div class="card">
          <div class="card-title">Últimas transações</div>
          <div id="listaTxs">
            <div class="empty"><span class="icon">💳</span>Carregando...</div>
          </div>
        </div>
      </div>
    </main>

    <script src="/static/api.js"></script>
    <script>
      const hoje = new Date();
      let mesSel = hoje.getMonth() + 1;
      let anoSel = hoje.getFullYear();

      async function init() {
        await mesOptions(document.getElementById("selMes"), mesSel);
        await anoOptions(document.getElementById("selAno"), anoSel);
        await render();
      }

      async function render() {
        try {
          const d = await API.relatorio({ mes: mesSel, ano: anoSel });

          document.getElementById("totalGanhos").textContent = fmtBRL(
            d.total_ganhos,
          );
          document.getElementById("totalGastos").textContent = fmtBRL(
            d.total_gastos,
          );

          const sEl = document.getElementById("saldoMes");
          sEl.textContent = fmtBRL(d.saldo);
          sEl.className = "stat-value " + (d.saldo >= 0 ? "pos" : "neg");

          const pct =
            d.total_ganhos > 0
              ? ((d.total_gastos / d.total_ganhos) * 100).toFixed(1)
              : 0;
          document.getElementById("barGastos").style.width =
            Math.min(pct, 100) + "%";
          document.getElementById("pctRenda").textContent =
            pct + "% da receita comprometida";
          document.getElementById("labelMesAno").textContent =
            MESES_NOME[mesSel] + " / " + anoSel;

          desenharBarras("evolChart", d.evolucao);

          if (d.total_ganhos > 0 || d.total_gastos > 0) {
            document.getElementById("donutWrap").style.display = "flex";
            document.getElementById("donutEmpty").style.display = "none";
            desenharDonutGG("donutChart", d.total_ganhos, d.total_gastos);
            const tot = d.total_ganhos + d.total_gastos;
            document.getElementById("donutLegend").innerHTML = [
              { label: "Ganhos", val: d.total_ganhos, cor: "#4ade80" },
              { label: "Gastos", val: d.total_gastos, cor: "#f87171" },
            ]
              .map(
                (f) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${f.cor}"></div>
          <span class="legend-name">${f.label}</span>
          <span style="font-weight:600;color:${f.cor}">${((f.val / tot) * 100).toFixed(1)}%</span>
        </div>
        <div style="font-size:.8rem;color:var(--text);margin-bottom:10px;margin-left:18px;">${fmtBRL(f.val)}</div>
      `,
              )
              .join("");
          } else {
            document.getElementById("donutWrap").style.display = "none";
            document.getElementById("donutEmpty").style.display = "block";
          }

          const recentes = [...d.transacoes].slice(-8).reverse();
          document.getElementById("listaTxs").innerHTML = recentes.length
            ? recentes
                .map(
                  (t) => `
          <div class="tx-row">
            <div>
              <div class="tx-desc">${t.descricao}</div>
              <div class="tx-meta">${String(t.mes).padStart(2, "0")}/${t.ano}</div>
            </div>
            <div class="tx-val ${t.tipo}">${t.tipo === "ganho" ? "+" : "-"}${fmtBRL(t.valor)}</div>
          </div>`,
                )
                .join("") +
              `<div style="margin-top:14px;"><a href="/transacoes" class="btn btn-ghost btn-sm">Ver todas →</a></div>`
            : `<div class="empty"><span class="icon">💳</span>Nenhuma transação neste período.</div>`;
        } catch (e) {
          console.error(e);
        }
      }

      document
        .getElementById("selMes")
        .addEventListener("change", async (e) => {
          mesSel = parseInt(e.target.value);
          await render();
        });
      document
        .getElementById("selAno")
        .addEventListener("change", async (e) => {
          anoSel = parseInt(e.target.value);
          await anoOptions(document.getElementById("selAno"), anoSel);
          await render();
        });
      window.addEventListener("resize", () => {
        API.relatorio({ mes: mesSel, ano: anoSel })
          .then((d) => desenharBarras("evolChart", d.evolucao))
          .catch(() => {});
      });

      init();
    </script>
  </body>
</html>
